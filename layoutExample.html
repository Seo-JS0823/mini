<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/reset.css">
	<title>가계부</title>
<style>
	body {
		width: 100%;
		height: auto;
		min-height: 100vh;
		background-color: black;
		overflow: auto;
	}
	.side {
		width: 100%;
		height: auto;
		background-color: #7B68EE;
		display: flex;
		align-items: center;
		justify-content: space-around;
	}
	.side-component-home,
	.side-component-search,
	.side-component-profile {
		width: 30%;
		min-width: 15rem;
		height: 4rem;
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 1rem;
	}
	.side-component-home {
		justify-content: start;
	}
	.side-component-profile {
		justify-content: flex-end;
	}
	.side-component-href {
		width: auto;
		height: auto;
		white-space: nowrap;
		color: white;
		font-size: 1.5rem;
		align-self: center;
	}
	.side-component-search > div {
		width: 100%;
		height: 70%;
		display: flex;
		align-items: center;
		background-color: white;
		padding: 0 1rem;
		border-radius: 2rem;
	}
	.side-component-search > div > img {
		width: 2rem;
	}
	.side-component-search > div > input[type=text] {
		width: calc(100% - 2rem);
		height: 50%;
		border: none;
		outline: none;
		padding-left: 1rem;
		font-size: 1rem;
	}
	.main-container {
		width: 100%;
		height: auto;
		background-color: white;
		display: flex;
		flex-direction: column;
		align-items: center;
		padding: 2rem 0;
		gap: 2rem;
	}
	.main-header {
		width: 60%;
		min-width: 40rem;
		height: 15rem;
		background-color: #7B68EE;
	}
	.main-area {
		width: 60%;
		min-width: 40rem;
		height: 80rem;
		background-color: #7B00EE;
	}
	.main-bottom {
		width: 60%;
		min-width: 40rem;
		height: 20rem;
		background-color: #8B68FF;
	}
</style>
</head>
<body>
<nav class="side">
	<div class="side-component-home">
		<a class="side-component-href" href="#">HOME</a>
		<a class="side-component-href" href="#">MENU</a>
	</div>
	<div class="side-component-search">
		<div>
			<img src="img/search.png">
			<input type="text" placeholder="search">
		</div>
	</div>
	<div class="side-component-profile">
		<a href="#">Test1</a>
		<a href="#">Test2</a>
		<a href="#">Test3</a>
	</div>
</nav>

<div class="main-container">
	<div class="main-header">
		
	</div>
	<div class="main-area">
		
	</div>
	<div class="main-bottom">
		
	</div>
</div>

<script>
</script>
</body>
</html>
