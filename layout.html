<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/font.css">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/color.css">
	<link rel="stylesheet" href="css/display.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
	<title>가계부 레이아웃 초안</title>
</head>
<body>
<!-- 상단바 -->
<nav class="main-navbar -bg-main -row -g2 -space-b ft-20">
	<div class="main-navbar-link -row -g2 -center">
		<div class="btn-e" id="home-href">Life Runer</div>
		<div class="btn-e" id="acot-href">가계부</div>
		<div class="btn-e" id="life-href">자기관리</div>
	</div>
	<div class="main-navbar-search -row -center">
		<div class="-row -center">
			<img src="img/search.png">
			<input class="search-bar ft-30" id="search" type="text" placeholder="search">
		</div>
	</div>
	<div class="main-navbar-user -row -g2 -space-b ft-20">
		<div class="btn-e" id="user-profile-btn">내 정보관리</div>
		<div class="main-navbar-user-smsbox -col" id="user-message-btn">
			<img src="img/bell.png">
			<!-- userSMS Component 'user-smsbox-headers' -->
		</div>
	</div>
</nav>

<!-- 메인 레이아웃 가계부 -->
<div class="main-content -col">
	<div class="main-lay-parent -row -g1 -space-b">
		<div class="main-menu-cpnt -col">
			<div class="-col">
				<span class="material-symbols-outlined">add_box</span>
				<div>수입 등록</div>
			</div>
		</div>
		<div class="main-menu-cpnt -col">
			<div class="-col">
				<span class="material-symbols-outlined">attach_money</span>
				<div>수출 등록</div>
			</div>
		</div>
		<div class="main-menu-cpnt -col">
			<div class="-col">
				<span class="material-symbols-outlined">chart_data</span>
				<div>통계 내기</div>
			</div>
		</div>
		<div class="main-menu-cpnt -col">
			<div class="-col">
				<span class="material-symbols-outlined">modeling</span>
				<div>시뮬레이션</div>
			</div>
		</div>
		<div class="main-menu-cpnt -col">
			<div class="-col">
				<span class="material-symbols-outlined">settings</span>
				<div>설정</div>
			</div>
		</div>
	</div>
	
	<div class="main-lay-parent -row -g1">
		<div class="-col -g1">
			<div class="main-lay-cpnt -col -h50">

			</div>
			<div class="main-lay-cpnt -col -h50">

			</div>
		</div>
		<div class="-col -g1">
			<div class="main-lay-cpnt -col -h70">
				
			</div>
			<div class="main-lay-cpnt -col -h30">

			</div>
		</div>
	</div>

	<div class="main-lay-parent">
		<div class="-col -g1">
			<div class="main-lay-cpnt -row -h60">

			</div>
		</div>
	</div>
</div>

<footer class="main-footer">

</footer>
<script src="js/life-runer-util.js"></script>
<script src="js/life-runer-component.js"></script>
<script>
	// Life Runer 버튼
	const homeHref = gettersId('home-href'); Urls.listener(homeHref);
	// 가계부 버튼
	const acotHref = gettersId('acot-href'); Urls.listener(acotHref);
	// 자기관리 버튼
	const lifeHref = gettersId('life-href'); Urls.listener(lifeHref);
	// 검색 버튼
	const searchRequest = gettersId('search'); Urls.search(searchRequest);
	// 사용자 정보 버튼
	const userHref = gettersId('user-profile-btn'); Urls.listener(userHref);
	// 사용자 메시지 버튼
	const userSms = gettersClass('main-navbar-user-smsbox');

	let smsboxSelector = false;
	userSms.addEventListener('click', () => {
		// TODO : 나중에 fetch then 안으로 옮기기
		let smsbox = render.getComponent('user-smsbox-headers', {
			user : {
				messageCount : 15,
				href: '/call',
				lastTakeTime: 3
			}
		})
		if(smsboxSelector) {
			let smsbox = gettersId('user-smsbox');
			smsboxSelector = false;
			userSms.removeChild(smsbox);
		} else {
			smsboxSelector = true;
			userSms.appendChild(smsbox);
		}
	});
</script>
<script>

</script>
</body>
</html>
