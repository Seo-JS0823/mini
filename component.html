<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Component JS TEST</title>
<style>
* {
	box-sizing: border-box;
}
html {
	font-size: 10px;
	font-weight: 500;
	font-family: sans-serif;
}
body {
	padding: 0;
	margin: 0;
	width: 100%;
	height: 100%;
}
#component {
	width: 100%;
	height: auto;
	padding-top: 2rem;
	padding-bottom: 2rem;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
}
</style>
</head>
<body>
<div id="component">

</div>
<script>
// 컴포넌트 저장소
const CPM = {
	components : {},
	setComponent(name, html) {
		this.components[name] = html;
	},
	getComponent(name, data) {
		let component = this.components[name];
		return component(data);
	}
}

const ComponentManager = {
	addComponentById(id, component) {
		const parent = document.getElementById(id);
		parent.appendChild(component);
	}
}

CPM.setComponent('header', () => {
	let header = document.createElement('h1');
	header.textContent = 'Component Test';
	return header;
});
CPM.setComponent('content', (json) => {
	let frag = document.createDocumentFragment();

	let usernameEl = document.createElement('div');
	usernameEl.textContent = `${json.name}`;

	let userageEl = document.createElement('div');
	userageEl.textContent = `${json.age}`;

	frag.appendChild(usernameEl);
	frag.appendChild(userageEl);
	return frag;
})

let headerTag = CPM.getComponent('header');
let contentTag = CPM.getComponent('content', {
	name:'주부성',
	age:27
})
ComponentManager.addComponentById('component', headerTag);
ComponentManager.addComponentById('component', contentTag);
</script>
</body>
</html>
